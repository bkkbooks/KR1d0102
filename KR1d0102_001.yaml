body:
  text: 禮論答問元興殷祭議曰若用三十月今則應用四月于時有殷而遷在冬太元元年十月殷祠若依三十月今則應用二年四月是追計辛未歲十月未合六十月而再殷杜佑通典卷四十九劉嗣問曰嗣去年十二月有周慘欲用六月婚兒服已早除大人本無服便是一家主想無復異答曰此議本據祖為孫兒婚自平吉可得娶妻不計兒之有慘也嗣弟損又重問曰諸賢唯元祖尊一家得為婚主若使婚損疑速也答曰今歸重於王父理無取於遲速損重問曰禮云嫁女之家三夜不息燭娶婦之家三日不舉樂得不有輕不又大功之末可以嫁女則男不得婚向家是嫁女今是己子婚男女詎無異耶答曰秉燭寢樂居然輕重故嫁娶殊品至於今事理本分塗唯取歸重極尊而不別異男女一也通典卷六十禮許變通記所謂父大功者當非有祖之家又公羊傳云不以父命辭王父母之命推附名例義在尊無二上容或可通理耶同上崇安四年太皇太后李氏崩祠部郎徐廣議左氏春秋母以子貴成風稱夫人文公服三年之喪凡子於父之所生體尊義重且禮祖不厭孫固宜遂服若嫌禮文不存則宜從重同為祖母服齊縗三年百官一周廣又尋按漢文所生薄太后亡朝臣亦服重服太常殷茂曰太皇太后名稱雖尊而據非正體主上篡承宗祖不宜持重謂宜齊服為安徐野人曰若以魯侯所行失禮者左傳不見譏責而漢代持服與正嫡無異殷太常所上服事於禮中尋求俱無明文然僕之所言專據春秋也車允答云漢代皆服重且大體己定此當無復翻革耶通典卷八十一樂亮問曰君弔之儀雖在於禮未審皇子之弔受弔為當迎送及拜以不當於廬室主當別施位耶若別施位者應在何處即位為應立應坐君弔已葬主人必絻此禮已廢並未詳既小祥重服已徐正當即以練冠功縗受弔耶答曰皇子之儀揖而不拜然猶應以練冠功縗迎立於戶側皇子向戶揖訖伏廬室而哭及皇子前執手時乃可長跪受之去出室還至戶更哭通典卷八十三庾氏問曰母喪已小祥而父亡未葬至母十三月常伸服三年猶厭屈而祥耶答曰按賀循云大未殯而祖亡承嫡猶周此不忍變父在也故自用父在服母之禮靈筵不得終三年也禮云三年之喪既葬乃為前喪練祥則猶須後喪葬訖乃得為前喪變服練祥也通典卷九十七蔡眇之問云從弟心喪當除此月不知猶應設祭者為應施床為地席耶其大兄昔在西知喪晚心制乃應除臘月其妹先除不知便可著綵衣不答曰禫著喪事之極也故於此日設祭而告終自爾之後沉哀在心故謂之心喪外無節文故服祭並闕也晦日唯哭以寫哀而已既各盡其服從禮而除矣綵衣無所疑通典卷一百一劉鎮之問父尚在母出嫁亡今改葬應有服不答云改葬服緦唯施極重此既出嫁未聞兒有服之文然緣情立禮令制服奉臨就從重之義合即心之理亦當無疑於不允也通典卷一百二
